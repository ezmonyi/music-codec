model:
  # Feature dimensions (concat = 1280 + 1024 + 2048 = 4352)
  whisper_dim: 1280        # Whisper-large-v3 encoder output
  wavlm_dim: 1024          # WavLM-Large last hidden state
  muq_dim: 2048            # MuQ-large (extra layer concat) last hidden state

  # Native frame rates (before resampling)
  whisper_frame_rate: 50   # 16kHz / 320 hop
  wavlm_frame_rate: 50     # 16kHz / 320 hop
  muq_frame_rate: 25       # 24kHz / 240 hop / 4x conv downsample
  target_frame_rate: 25    # common frame rate after resampling

  # VQ: single-layer (default) or 8-layer RVQ
  # Single VQ:
  codebook_size: 8192
  codebook_dim: 256        # in_proj output dim, codebook entry dim
  # RVQ (use_rvq: true): 8 layers, each layer discretized dim = 16, concat → cond_proj → CFM
  # use_rvq: false
  # rvq_codebook_sizes: [1024, 1024, 1024, 1024, 1024, 1024, 1024, 1024]  # 8x1024
  # rvq_hidden_dim: 256
  # rvq_codebook_dim: 16
  # cfm_cond_dim: 256      # condition dim fed to CFM (RVQ concat 8*16=128 → cond_proj 128→256)

  # in_proj: concat (4352) → codebook_dim (single) or rvq_hidden_dim (RVQ). None or [] = single Linear; else MLP
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1

  # CFM (FlowMatchingTransformer → DiffLlama)
  mel_dim: 128
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos      # cosine time schedule for harder early steps
  cond_scale_factor: 2     # 25Hz condition → 50Hz mel

  # Inference
  n_timesteps: 32
  cfg_scale: 1.0
  rescale_cfg: 0.75

audio:
  sample_rate: 24000
  hop_size: 480            # mel frame rate = 24000 / 480 = 50Hz
  n_fft: 1920
  num_mels: 128
