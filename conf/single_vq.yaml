# Codec training config (hyperpyyaml). Run from repo root with PYTHONPATH=$PWD.

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

dataset_conf:
  manifest_path: ""   # override via --dataset_conf or set in dataset yaml
  max_frames_50hz: 1500
  seed: 42

model: !new:model.AudioReconModel
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 1024
  codebook_size: 8192
  codebook_dim: 256
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  mel_dim: 128
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos
  cond_scale_factor: 2
  use_codebook_ema: false
  ema_decay: 0.99

train_conf:
  dtype: fp32
  batch_size: 8
  optim: adamw
  optim_conf:
    lr: 3.0e-4
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 5000
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 1
  log_interval: 50
  save_per_step: 2000
  commit_loss_weight: 0.25
  codebook_loss_weight: 1.0   # used when RVQ (commit*0.25 + codebook*1.0, like SoundStream/mucodec)
  # Mel reconstruction + MS-STFT discriminator (EnCodec-style); balancer balances mel_recon and disc_gen when use_disc
  mel_recon_weight: 0.0       # L1(pred_mel, gt_mel); 0 = off
  mel_recon_n_steps: 4        # ODE steps for pred_mel when mel_recon or disc enabled
  use_disc: false             # MS-STFT discriminator on waveform (mel->wav via Griffin-Lim)
  disc_weight: 1.0
  disc_lr: 1.0e-4
  disc_filters: 32
  disc_n_ffts: [1024, 2048, 512]
  disc_hop_lengths: [256, 512, 128]
  disc_win_lengths: [1024, 2048, 512]
  balancer_weights:
    mel_recon: 1.0
    disc_gen: 1.0
  balancer_rescale_grads: true
  balancer_total_norm: 1.0
  balancer_ema_decay: 0.999