# Single VQ base config with all available options.
# This serves as the reference template — toggle options as needed.

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

dataset_conf:
  manifest_path: ""
  max_frames_50hz: 1500
  seed: 42

model: !new:model.AudioReconModel
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 1024
  codebook_size: 8192
  codebook_dim: 256
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  mel_dim: 128
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos
  cond_scale_factor: 2
  use_codebook_ema: false
  ema_decay: 0.99
  entropy_loss_weight: 1.0
  codebook_init_std: 0.02
  codebook_init: "normal"
  vq_pre_batch_norm: false

train_conf:
  dtype: fp32
  batch_size: 12

  # Checkpoint restore
  restore_model_path: null
  restore_load_encoder: false

  optim: adamw
  optim_conf:
    lr: 5.0e-4
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 5000
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 1
  log_interval: 50
  save_per_step: 2000

  # Eval: every N steps run one batch (no grad), decode to mel and log L1 recon loss to TensorBoard
  eval_mel_recon_every_steps: 100
  eval_mel_recon_n_steps: 8

  # Flow loss (fixed weight; set _start/_end/_decay_steps to enable schedule)
  flow_loss_weight: 0.1
  flow_loss_weight_start: 0.01
  flow_loss_weight_end: 0.1
  flow_loss_decay_steps: 15000

  # Commit loss (fixed weight; set _start/_end/_decay_steps to enable schedule)
  commit_loss_weight: 0.25
  commit_loss_weight_start: 0.05
  commit_loss_weight_end: 0.5
  commit_loss_decay_steps: 15000

  codebook_loss_weight: 1.0

  # Entropy loss (fixed weight; set _start/_end/_decay_steps to enable schedule)
  entropy_loss_weight: 0.2
  entropy_loss_weight_start: 100.0
  entropy_loss_weight_end: 0.2
  entropy_loss_decay_steps: 20000

  # Mel reconstruction
  mel_recon_weight: 0.0
  mel_recon_n_steps: 4

  # Discriminator
  use_disc: false
  disc_weight: 1.0
  disc_lr: 1.0e-4
  disc_filters: 32
  disc_n_ffts: [1024, 2048, 512]
  disc_hop_lengths: [256, 512, 128]
  disc_win_lengths: [1024, 2048, 512]

  # Grad balancer
  balancer_weights:
    mel_recon: 1.0
    disc_gen: 1.0
  balancer_rescale_grads: true
  balancer_total_norm: 1.0
  balancer_ema_decay: 0.999
