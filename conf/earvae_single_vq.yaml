# Single VQ joint training with EAR_VAE latent target.
# Dataset reads waveform from OSS, EAR_VAE encodes to latent; FM reconstructs latent.
# Usage: ./bin/train.sh conf/earvae_single_vq.yaml earvae_vq_exp

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

dataset_conf:
  urls: "/mnt/fcl-jfs/music_tokenizer/webdataset_data/processed_webdataset_1000w_with_features/shard_64*.tar"
  max_frames_50hz: 1500
  seed: 42
  cv_ratio: 0.05
  target_type: "earvae_latent"
  target_sr: 48000

ear_vae:
  source_dir: "/home/wangyi/workspace/code/stepmusic_infer/flowmatching2/EAR_VAE"
  config_json: "config/ear_vae_v2.json"
  hf_repo: "earlab/EAR_VAE"
  hf_filename: "pretrained_weight/ear_vae_v2_48k.pyt"
  target_sr: 48000
  downsampling_ratio: 960

model: !new:model.AudioReconModel
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 2048
  codebook_size: 8192
  codebook_dim: 256
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  mel_dim: 64
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos
  cond_scale_factor: 2
  use_codebook_ema: false
  ema_decay: 0.99
  entropy_loss_weight: 1.0
  codebook_init_std: 0.02
  codebook_init: "normal"
  vq_pre_batch_norm: false

train_conf:
  dtype: fp32
  batch_size: 12
  restore_model_path: null
  optim: adamw
  optim_conf:
    lr: 5.0e-4
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 5000
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 1
  log_interval: 50
  save_per_step: 2000
  eval_mel_recon_every_steps: 100
  eval_mel_recon_n_steps: 8
  eval_mcd_every_steps: 0
  flow_loss_weight: 0.1
  flow_loss_weight_start: 0.01
  flow_loss_weight_end: 0.1
  flow_loss_decay_steps: 15000
  commit_loss_weight: 0.25
  commit_loss_weight_start: 0.05
  commit_loss_weight_end: 0.5
  commit_loss_decay_steps: 15000
  codebook_loss_weight: 1.0
  entropy_loss_weight: 0.2
  entropy_loss_weight_start: 100.0
  entropy_loss_weight_end: 0.2
  entropy_loss_decay_steps: 20000
  mel_recon_weight: 0.0
  mel_recon_n_steps: 4
