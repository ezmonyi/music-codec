# FM-only training with EAR_VAE latent target (Stage 1).
# Dataset reads waveform from OSS, caches per song, chunks by segment, resamples to 48kHz stereo.
# EAR_VAE encodes on GPU in batch_forward; latent (B,T,64) is the FM reconstruction target.
# Usage: ./bin/train.sh conf/earvae_fm_only.yaml earvae_exp

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

estimator_type: "dit"

dataset_conf:
  urls: "/mnt/fcl-jfs/music_tokenizer/webdataset_data/processed_webdataset_1000w_with_features/shard_64*.tar"
  max_frames_50hz: 1500
  seed: 42
  cv_ratio: 0.05
  target_type: "earvae_latent"
  target_sr: 48000

ear_vae:
  source_dir: "/home/wangyi/workspace/code/stepmusic_infer/flowmatching2/EAR_VAE"
  config_json: "config/ear_vae_v2.json"
  hf_repo: "earlab/EAR_VAE"
  hf_filename: "pretrained_weight/ear_vae_v2_48k.pyt"
  target_sr: 48000
  downsampling_ratio: 960

# Model: mel_dim=64 for EAR_VAE latent; same architecture as mel_fm_only otherwise
model: !new:model.AudioReconModel
  fm_only: true
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 2048
  codebook_size: 32768
  codebook_dim: 64
  cfm_cond_dim: 1024
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  post_vq_proj_dims: [512, 1024]
  mel_dim: 64
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-6
  time_scheduler: cos
  cond_scale_factor: 1
  use_codebook_ema: false
  ema_decay: 0.99
  entropy_loss_weight: 0.0
  codebook_init_std: 0.02
  codebook_init: "normal"
  vq_pre_batch_norm: false
  cfm_gradient_checkpointing: true
  estimator_type: !ref <estimator_type>

# No stat block: latent needs no normalization

train_conf:
  dtype: fp32
  batch_size: 32
  restore_model_path: null
  optim: adamw
  optim_conf:
    lr: 1.0e-5
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 2500
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 2
  log_interval: 50
  save_per_step: 2000
  sigma: 1.0e-6
  flow_loss_weight: 1.0

  eval_mel_recon_every_steps: 100
  eval_mel_recon_n_steps: 8
  # MCD skipped for earvae (latent L1 logged instead)
  eval_mcd_every_steps: 0
  eval_mcd_max_samples: 100
