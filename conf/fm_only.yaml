# FM-only training: bypass VQ, send encoder features directly to CFM.
# Same model architecture as single_vq.yaml for checkpoint compatibility.
# Exported checkpoints (encoder_cfm_*.pt) have encoder+CFM trained, VQ random.
#
# Usage:
#   ./bin/run_fm_only.sh conf/fm_only.yaml
#   # then set restore_model_path in single_vq.yaml to encoder_cfm_*.pt

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

dataset_conf:
  manifest_path: ""
  max_frames_50hz: 1500
  seed: 42

# Model: identical to single_vq.yaml (VQ codebook is present but frozen/bypassed)
model: !new:model.AudioReconModel
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 1024
  codebook_size: 8192
  codebook_dim: 256
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  mel_dim: 128
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos
  cond_scale_factor: 2
  use_codebook_ema: false
  ema_decay: 0.99
  entropy_loss_weight: 0.0
  codebook_init_std: 0.02
  codebook_init: "normal"
  vq_pre_batch_norm: false

train_conf:
  dtype: fp32
  batch_size: 12             # same as joint training (CFM is the memory bottleneck)
  restore_model_path: null
  optim: adamw
  optim_conf:
    lr: 5.0e-4
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 5000
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 1
  log_interval: 50
  save_per_step: 2000
  sigma: 1.0e-5              # flow matching sigma (matches model)
