# FM-only training: bypass VQ entirely. Pre-VQ features (z_e from in_proj) go
# directly as condition to the flow matching reconstruction model.
# VQ layers exist but are never used in forward; only in_proj + CFM are trained.
#
# Usage:
#   ./bin/train_music_codec.sh conf/fm_only.yaml

__set_seed1: !apply:random.seed [42]
__set_seed2: !apply:numpy.random.seed [42]
__set_seed3: !apply:torch.manual_seed [42]
__set_seed4: !apply:torch.cuda.manual_seed_all [42]

dataset_conf:
  manifest_path: ""
  max_frames_50hz: 1500
  seed: 42

# Model: fm_only=True bypasses VQ, sends pre-VQ features directly to CFM
model: !new:model.AudioReconModel
  fm_only: true
  whisper_dim: 1280
  wavlm_dim: 1024
  muq_dim: 2048
  codebook_size: 8192
  codebook_dim: 256
  in_proj_hidden_dims: [1024, 512]
  in_proj_dropout: 0.1
  mel_dim: 128
  hidden_size: 1024
  num_layers: 22
  num_heads: 16
  cfg_drop_prob: 0.2
  sigma: 1.0e-5
  time_scheduler: cos
  cond_scale_factor: 2
  use_codebook_ema: false
  ema_decay: 0.99
  entropy_loss_weight: 0.0
  codebook_init_std: 0.02
  codebook_init: "normal"
  vq_pre_batch_norm: false
  cfm_gradient_checkpointing: true   # reduce OOM (trades compute for memory)

train_conf:
  dtype: fp32
  batch_size: 16              # lower than joint; use 4 if still OOM with gradient_checkpointing
  restore_model_path: null
  optim: adamw
  optim_conf:
    lr: 5.0e-4
  scheduler: warmuplr
  scheduler_conf:
    warmup_steps: 5000
    last_epoch: -1
  max_epoch: 200
  grad_clip: 5.0
  accum_grad: 1
  log_interval: 50
  save_per_step: 2000
  sigma: 1.0e-5              # flow matching sigma (matches model)

  # Eval: every N steps run one batch (no grad), generate mel and log L1 recon loss
  eval_mel_recon_every_steps: 100
  eval_mel_recon_n_steps: 8  # ODE steps for eval generation (fewer = faster)
